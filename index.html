<!DOCTYPE html>
<html>
<head>
    <title>NordPass</title>
    <!-- This is the direct image link Safari needs for the icon -->
    <link rel="apple-touch-icon" href="https://mzstatic.com">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script>
        // Waits 3 seconds so you have time to tap 'Add to Home Screen'
        setTimeout(function(){
            window.location.href = "https://app.nordpass.com/vault";
        }, 3000);
    </script>
</head>
<body>
    <p>Redirecting to NordPass in 3 seconds...</p>
    <p>Tap Share > Add to Home Screen now to save with the custom icon!</p>
</body>
</html>
